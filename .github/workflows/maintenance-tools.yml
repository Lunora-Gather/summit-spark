name: Maintenance Tools

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintenance-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check maintenance tools
        run: node tools/check-maintenance-tools.js
